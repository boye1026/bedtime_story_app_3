name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Fix pubspec.yaml
        working-directory: mobile
        run: |
          cat > pubspec.yaml << 'EOF'
          name: bedtime_story_app
          description: AI睡前故事应用
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: "">=3.12.0 <4.0.0""

          dependencies:
            flutter:
              sdk: flutter
            flutter_tts: ^3.8.5
            google_fonts: ^6.1.0
            shared_preferences: ^2.2.2
            path_provider: ^2.1.1
            dio: ^5.4.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          EOF
      
      - name: Install dependencies
        working-directory: mobile
        run: |
          flutter clean
          flutter pub get
      
      - name: Build APK
        working-directory: mobile
        run: flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: bedtime-story-app
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
